name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Xcode)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build RockyCore
        run: swift build --package-path RockyCore

      - name: Test RockyCore
        run: swift test --package-path RockyCore

      - name: Build RockyCLI
        run: swift build --package-path RockyCLI

  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite
        run: apt-get update && apt-get install -y libsqlite3-dev

      - name: Build RockyCore
        run: swift build --package-path RockyCore

      - name: Test RockyCore
        run: swift test --package-path RockyCore

      - name: Build RockyCLI
        run: swift build --package-path RockyCLI
